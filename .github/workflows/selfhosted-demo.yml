name: Self-Hosted Windows CI Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  info:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Show machine info
        shell: powershell
        run: |
          Write-Host "Machine: $env:COMPUTERNAME"
          Write-Host "User: $env:USERNAME"
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          git --version

  build:
    runs-on: [self-hosted, Windows, X64]
    needs: info
    steps:
      - uses: actions/checkout@v4

      - name: Create build output
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          "Hello from self-hosted runner" | Out-File output\build.txt
          Get-Content output\build.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: output/build.txt

  deploy:
    runs-on: [self-hosted, Windows, X64]
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Fake local deploy
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\demo-deploy | Out-Null
          "Deployed on $(Get-Date)" | Out-File C:\demo-deploy\deploy.txt
          Get-Content C:\demo-deploy\deploy.txt